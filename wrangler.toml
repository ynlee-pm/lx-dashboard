name = "leadtime-dashboard"
main = "worker.js"
compatibility_date = "2024-11-01"

# Secrets — Cloudflare Dashboard > Workers > Settings > Variables & Secrets 에서 설정
#   ANTHROPIC_API_KEY
#   NOTES_TOKEN

# KV — Dashboard > Workers > Settings > KV Namespace Bindings 에서 설정
#   Variable name: NOTES  →  KV namespace: DEPLOY_NOTES
[[kv_namespaces]]
binding = "NOTES"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
